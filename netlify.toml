[build]
  command = "cd Frontend && yarn install && yarn build"
  publish = "Frontend/dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "yarn start"
  port = 8888
  targetPort = 4201
  publish = "Frontend/dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

